# Oracle Always Free Autonomous Database (profile: oracle)
# Activate with: -Dspring.profiles.active=oracle or SPRING_PROFILES_ACTIVE=oracle
# Required env: ORACLE_JDBC_URL, ORACLE_USER, ORACLE_PASSWORD, TNS_ADMIN (or set in variables.env)

spring.datasource.url=${ORACLE_JDBC_URL}
spring.datasource.username=${ORACLE_USER}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Optional: HikariCP tuning for Oracle
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# JPA for session-scoped data (tables BEWERB_SESSION_DATA, BEWERB_SESSION_REVIEW)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.open-in-view=false
